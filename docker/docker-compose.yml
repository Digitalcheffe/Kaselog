services:
  kaselog:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - kaselog-data:/data
    environment:
      KASELOG_PORT: "5000"
      KASELOG_DB_PROVIDER: sqlite
      KASELOG_DATA_PATH: /data/kaselog.db
    restart: unless-stopped

volumes:
  kaselog-data:
